        Override this if you want:
            • Stronger password rules
            • Extra logging
            • Notify user after password change
            • Invalidate all sessions
      tags:
      - password_reset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordToken'
          application/xml:
            schema:
              $ref: '#/components/schemas/PasswordToken'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordToken'
          description: ''
  /api/v1/reset/confirm/render_reset_page/:
    get:
      operationId: api_v1_reset_confirm_render_reset_page_retrieve
      description: |-
        Custom GET handler for browser-based reset flow.

        This does NOT affect API behavior.
      tags:
      - password_reset
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordToken'
          description: ''
  /api/v1/reset/validate_token/:
    post:
      operationId: api_v1_reset_validate_token_create
      description: |-
        Handles POST /password/reset/validate_token/

        🔹 What it does:
            - Checks if token exists
            - Checks if token expired
            - Returns validity response

        🔹 Where to customize:
            - Override `create()` to:
                • Add custom expiration logic
                • Add attempt tracking
                • Add logging
      tags:
      - password_reset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetToken'
          application/xml:
            schema:
              $ref: '#/components/schemas/ResetToken'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetToken'
          description: ''
  /api/v1/security/2fa/reset_recovery_codes/:
    post:
      operationId: api_v1_security_2fa_reset_recovery_codes_create
      description: |-
        Regenerate all recovery codes for the authenticated user.
        Requires password confirmation. Codes are shown once and never again.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetRecoveryCodes'
          application/xml:
            schema:
              $ref: '#/components/schemas/ResetRecoveryCodes'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetRecoveryCodes'
          description: ''
  /api/v1/security/password/:
    put:
      operationId: api_v1_security_password_update
      description: Change password for an authenticated user who knows their current
        password.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordReset'
          application/xml:
            schema:
              $ref: '#/components/schemas/PasswordReset'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordReset'
          description: ''
  /api/v1/security/password/reset_forgot_password/:
    put:
      operationId: api_v1_security_password_reset_forgot_password_update
      description: Reset password using an OTP sent to email or phone.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetForgottenPassword'
          application/xml:
            schema:
              $ref: '#/components/schemas/ResetForgottenPassword'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetForgottenPassword'
          description: ''
  /api/v1/security/password/send_forgot_password_otp/:
    put:
      operationId: api_v1_security_password_send_forgot_password_otp_update
      description: |-
        Send a password-reset OTP to the user's email or phone.
        Always responds with 200 to avoid leaking account existence.
