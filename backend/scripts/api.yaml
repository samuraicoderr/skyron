openapi: 3.0.3
info:
  title: melodii API
  version: 1.0.0
  description: Backend API documentation for melodii
paths:
  /api/v1/auth/join_waitlist/:
    post:
      operationId: api_v1_auth_join_waitlist_create
      description: |-
        Handles registration, onboarding, OTP flows, password management,
        2FA setup, and recovery code management.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WaitList'
          application/xml:
            schema:
              $ref: '#/components/schemas/WaitList'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WaitList'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: api_v1_auth_login_create
      description: |-
        Handles registration, onboarding, OTP flows, password management,
        2FA setup, and recovery code management.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLogin'
          application/xml:
            schema:
              $ref: '#/components/schemas/AuthLogin'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogin'
          description: ''
  /api/v1/auth/login/refresh_token/:
    post:
      operationId: api_v1_auth_login_refresh_token_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/xml:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/mfa/authapp/qr-image/{token}/:
    get:
      operationId: api_v1_auth_mfa_authapp_qr_image_retrieve
      description: |-
        Renders a QR code PNG for the given short-lived signed token.
        Used by email clients or frontends that cannot render otpauth URIs directly.
      parameters:
      - in: path
        name: token
        schema:
          type: string
          pattern: ^.*$
        required: true
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/mfa/authapp/request_qr_code/:
    post:
      operationId: api_v1_auth_mfa_authapp_request_qr_code_create
      description: |-
        Returns a short-lived signed URL for the QR image and the raw otpauth URI.

        Prefer the `qrcode_uri` — render the QR yourself on the frontend.
        **DO NOT store the QR code or URI in localStorage or any browser storage.**
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/xml:
            schema:
              $ref: '#/components/schemas/User'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/mfa/challenge/:
    post:
      operationId: api_v1_auth_mfa_challenge_create
      description: Initiate an MFA challenge for the user associated with the provided
        MFA session token.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAChallenge'
          application/xml:
            schema:
              $ref: '#/components/schemas/MFAChallenge'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAChallenge'
          description: ''
  /api/v1/auth/mfa/methods/:
    get:
      operationId: api_v1_auth_mfa_methods_retrieve
      description: Return the available MFA methods for the authenticated user.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/mfa/push/register-device/:
    post:
      operationId: api_v1_auth_mfa_push_register_device_create
      description: Register a push notification device for MFA challenges. Requires
        the device token and platform.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAPushDevice'
          application/xml:
            schema:
              $ref: '#/components/schemas/MFAPushDevice'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAPushDevice'
          description: ''
  /api/v1/auth/mfa/setup/totp/:
    post:
      operationId: api_v1_auth_mfa_setup_totp_create
      description: Initiate TOTP setup for the authenticated user and return the provisioning
        URI.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFATotpSetup'
          application/xml:
            schema:
              $ref: '#/components/schemas/MFATotpSetup'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFATotpSetup'
          description: ''
  /api/v1/auth/mfa/setup/webauthn/:
    post:
      operationId: api_v1_auth_mfa_setup_webauthn_create
      description: Initiate WebAuthn setup for the authenticated user and return the
        challenge and credential options.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAWebAuthnSetup'
          application/xml:
            schema:
              $ref: '#/components/schemas/MFAWebAuthnSetup'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAWebAuthnSetup'
          description: ''
  /api/v1/auth/mfa/verify/:
    post:
      operationId: api_v1_auth_mfa_verify_create
      description: Verify the response to an MFA challenge using the provided MFA
        session token.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAVerify'
          application/xml:
            schema:
              $ref: '#/components/schemas/MFAVerify'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAVerify'
          description: ''
  /api/v1/auth/mfa/verify/totp/:
    post:
      operationId: api_v1_auth_mfa_verify_totp_create
      description: Verify the TOTP code provided by the user during TOTP setup.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFATotpVerify'
          application/xml:
            schema:
              $ref: '#/components/schemas/MFATotpVerify'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFATotpVerify'
          description: ''
  /api/v1/auth/mfa/verify/webauthn/:
    post:
      operationId: api_v1_auth_mfa_verify_webauthn_create
      description: Verify the WebAuthn assertion provided by the user during the MFA
        challenge flow.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAWebAuthnVerify'
          application/xml:
            schema:
              $ref: '#/components/schemas/MFAWebAuthnVerify'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAWebAuthnVerify'
          description: ''
  /api/v1/auth/onboarding/email/check_email_verification_otp/:
    post:
      operationId: api_v1_auth_onboarding_email_check_email_verification_otp_create
      description: |-
        Verify the email OTP. On success, marks email as verified and
        advances onboarding. Raises ValidationError on invalid/expired OTP.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerification'
          application/xml:
            schema:
              $ref: '#/components/schemas/EmailVerification'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerification'
          description: ''
  /api/v1/auth/onboarding/email/send_email_verification_otp/:
    post:
      operationId: api_v1_auth_onboarding_email_send_email_verification_otp_create
      description: Send a verification OTP to the user's email address.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerification'
          application/xml:
            schema:
              $ref: '#/components/schemas/EmailVerification'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerification'
          description: ''
  /api/v1/auth/onboarding/get_onboarding_token/:
    post:
      operationId: api_v1_auth_onboarding_get_onboarding_token_create
      description: |-
        Authenticate the user and return an onboarding token.
        Only works while onboarding is incomplete.
        Token expires after `settings.ONBOARDING_TOKEN_EXPIRY_TIME_SECONDS`.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetOboardingToken'
          application/xml:
            schema:
              $ref: '#/components/schemas/GetOboardingToken'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOboardingToken'
          description: ''
  /api/v1/auth/onboarding/phone/check_phone_verification_otp/:
    post:
      operationId: api_v1_auth_onboarding_phone_check_phone_verification_otp_create
      description: |-
        Verify the phone OTP. On success, marks phone as verified and
        advances onboarding. Raises ValidationError on invalid/expired OTP.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerification'
          application/xml:
            schema:
              $ref: '#/components/schemas/PhoneVerification'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerification'
          description: ''
  /api/v1/auth/onboarding/phone/send_phone_verification_otp/:
    post:
      operationId: api_v1_auth_onboarding_phone_send_phone_verification_otp_create
      description: Send a verification OTP to the user's phone number.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerification'
          application/xml:
            schema:
              $ref: '#/components/schemas/PhoneVerification'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerification'
          description: ''
  /api/v1/auth/onboarding/set_profile_picture/:
    post:
      operationId: api_v1_auth_onboarding_set_profile_picture_create
      description: |-
        Upload profile picture during onboarding.
        Requires a valid onboarding token. Advances onboarding on success.
      tags:
      - auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangeProfilePicture'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangeProfilePicture'
          '*/*':
            schema:
              $ref: '#/components/schemas/ChangeProfilePicture'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUser'
          description: ''
  /api/v1/auth/onboarding/set_username/:
    post:
      operationId: api_v1_auth_onboarding_set_username_create
      description: |-
        Set the user's username during onboarding.
        Requires a valid onboarding token. Advances onboarding on success.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeUserName'
          application/xml:
            schema:
              $ref: '#/components/schemas/ChangeUserName'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeUserName'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: api_v1_auth_register_create
      description: |-
        Register a new user account.
        Returns the created user and advances onboarding to the first real step.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
          application/xml:
            schema:
              $ref: '#/components/schemas/CreateUser'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUser'
          description: ''
  /api/v1/notifications/:
    get:
      operationId: api_v1_notifications_list
      description: |-
        ViewSet for managing user notifications.

        Provides list, retrieve, mark as read, mark all as read, and unread count endpoints.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/notifications/{id}/:
    get:
      operationId: api_v1_notifications_retrieve
      description: |-
        ViewSet for managing user notifications.

        Provides list, retrieve, mark as read, mark all as read, and unread count endpoints.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/notifications/{id}/read/:
    patch:
      operationId: api_v1_notifications_read_partial_update
      description: |-
        PATCH /api/v1/notifications/<id>/read/
        Marks a single notification as read.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/notifications/mark-all-read/:
    post:
      operationId: api_v1_notifications_mark_all_read_create
      description: |-
        POST /api/v1/notifications/mark-all-read/
        Marks all of the current user's unread notifications as read.
      tags:
      - notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/notifications/unread-count/:
    get:
      operationId: api_v1_notifications_unread_count_retrieve
      description: |-
        GET /api/v1/notifications/unread-count/
        Returns the count of unread notifications for the current user.
      tags:
      - notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/oauth/{provider}/callback/:
    get:
      operationId: api_v1_oauth_callback_retrieve
      description: |-
        OAuth callback endpoint that providers (e.g. Google) redirect to after authorization.

        Accepts OAuth query parameters (code, state, etc.) via GET, completes the
        authentication flow, and returns a JWT response.

        GET /api/v1/oauth/{provider}/callback/?code=...&state=...
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - oauth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/oauth/{provider}/login-or-register/:
    post:
      operationId: api_v1_oauth_login_or_register_create
      description: Provider-based OAuth login endpoint for code exchange flows.
      parameters:
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - oauth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCodeExchange'
          application/xml:
            schema:
              $ref: '#/components/schemas/OAuthCodeExchange'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthCodeExchange'
          description: ''
  /api/v1/oauth/get_providers/:
    get:
      operationId: api_v1_oauth_get_providers_retrieve
      description: Provider-based OAuth login endpoint for code exchange flows.
      tags:
      - oauth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/organizations/:
    get:
      operationId: api_v1_organizations_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - organizations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizationList'
          description: ''
    post:
      operationId: api_v1_organizations_create
      tags:
      - organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganization'
          application/xml:
            schema:
              $ref: '#/components/schemas/CreateOrganization'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrganization'
          description: ''
  /api/v1/organizations/{organization_id}/audit-logs/:
    get:
      operationId: api_v1_organizations_audit_logs_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - organizations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizationAuditLogList'
          description: ''
  /api/v1/organizations/{organization_id}/audit-logs/{id}/:
    get:
      operationId: api_v1_organizations_audit_logs_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this organization audit log.
        required: true
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationAuditLog'
          description: ''
  /api/v1/organizations/{organization_id}/invitations/:
    get:
      operationId: api_v1_organizations_invitations_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - organizations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizationInvitationList'
          description: ''
    post:
      operationId: api_v1_organizations_invitations_create
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitation'
          application/xml:
            schema:
              $ref: '#/components/schemas/CreateInvitation'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInvitation'
          description: ''
  /api/v1/organizations/{organization_id}/invitations/{id}/:
    get:
      operationId: api_v1_organizations_invitations_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this organization invitation.
        required: true
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationInvitation'
          description: ''
  /api/v1/organizations/{organization_id}/invitations/{id}/accept/:
    post:
      operationId: api_v1_organizations_invitations_accept_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this organization invitation.
        required: true
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitation'
          application/xml:
            schema:
              $ref: '#/components/schemas/AcceptInvitation'
