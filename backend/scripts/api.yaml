components:
  schemas:
    AcceptInvitation:
      type: object
      properties:
        token:
          type: string
          maxLength: 255
    AuthLogin:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          maxLength: 128
      required:
      - email
      - password
    ChangeProfilePicture:
      type: object
      properties:
        onboarding_token:
          type: string
          writeOnly: true
          maxLength: 500
        profile_picture:
          type: string
          format: binary
      required:
      - onboarding_token
      - profile_picture
    ChangeUserName:
      type: object
      properties:
        onboarding_token:
          type: string
          writeOnly: true
          maxLength: 500
        new_username:
          type: string
          writeOnly: true
          maxLength: 150
      required:
      - onboarding_token
    CreateInvitation:
      type: object
      properties:
        email:
          type: string
          format: email
        role_id:
          type: string
          format: uuid
        message:
          type: string
          maxLength: 500
        expires_at:
          type: string
          format: date-time
      required:
      - email
      - role_id
    CreateOrganization:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        logo:
          type: string
          format: uri
          nullable: true
        status:
          $ref: '#/components/schemas/StatusA3eEnum'
        settings: {}
      required:
      - id
      - name
    CreateOrganizationMembership:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role_id:
          type: string
          format: uuid
      required:
      - role_id
    CreateOrganizationResource:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        resource_type:
          $ref: '#/components/schemas/ResourceTypeEnum'
        payload: {}
      required:
      - id
      - name
    CreateOrganizationRole:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        permissions: {}
      required:
      - id
      - name
    CreateOrganizationSetting:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        key:
          type: string
          maxLength: 100
        value: {}
        description:
          type: string
          maxLength: 255
      required:
      - id
      - key
    CreateUser:
      type: object
      description: |-
        Used for registration input validation and the registration response.
        User creation is handled explicitly in the view — do not call .save() on this serializer.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        password:
          type: string
          writeOnly: true
          maxLength: 128
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        profile_picture:
          type: string
          format: uri
          nullable: true
        phone_number:
          type: string
          nullable: true
          maxLength: 128
        onboarding_status:
          allOf:
          - $ref: '#/components/schemas/OnboardingStatusEnum'
          readOnly: true
        onboarding_flow:
          type: array
          items: {}
          readOnly: true
        is_email_verified:
          type: boolean
          readOnly: true
        is_phone_number_verified:
          type: boolean
          readOnly: true
        onboarding_token:
          type: string
